<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background: rounded red square -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#EA4335"/>
  <!-- Door shape -->
  <rect x="38" y="28" width="40" height="72" rx="4" fill="#FFFFFF" opacity="0.95"/>
  <!-- Door handle -->
  <circle cx="70" cy="64" r="4" fill="#EA4335"/>
