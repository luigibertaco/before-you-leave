  <line x1="104" y1="64" x2="82" y2="64" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <!-- Small notepad/clipboard at bottom-right -->
  <rect x="80" y="76" width="28" height="24" rx="3" fill="#FFFFFF"/>
  <line x1="86" y1="83" x2="102" y2="83" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="89" x2="98" y2="89" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="95" x2="95" y2="95" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/>
</svg>
